<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Cuentas Claras</title>
<meta name="description" content="Controla tu ingreso, pagos fijos, tarjetas y ahorro." />
<meta name="theme-color" content="#007AFF" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Cuentas Claras" />
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; -moz-user-select: none; }
html, body { margin:0; padding:0; }
input, textarea { user-select: text; -webkit-user-select: text; -moz-user-select: text; }

:root {
  --bg: #F2F2F7; --card-bg: #FFFFFF; --card-bg-2: #FAFAFB; --text: #1C1C1E; --text-muted: #8E8E93;
  --border: #F0F0F2; --input-bg: #F7F7F9; --input-border: #E5E5EA; --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.04); --pill-bg: #E9E9EB;
}
[data-theme="dark"] {
  --bg: #000000; --card-bg: #1C1C1E; --card-bg-2: #232326; --text: #F2F2F7; --text-muted: #98989D;
  --border: #2C2C2E; --input-bg: #2C2C2E; --input-border: #3A3A3C; --shadow: 0 1px 3px rgba(0,0,0,0.5); --pill-bg: #2C2C2E;
}

body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; line-height: 1.4; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; transition: background 0.2s, color 0.2s; }
.page { padding: 18px 14px 60px; padding-top: max(18px, env(safe-area-inset-top)); padding-bottom: calc(78px + env(safe-area-inset-bottom)); }
.wrap { max-width: 760px; margin: 0 auto; }

.tab-bar { position: fixed; left: 0; right: 0; bottom: 0; background: var(--card-bg); border-top: 1px solid var(--border); display: flex; padding: 6px 6px calc(6px + env(safe-area-inset-bottom)); z-index: 30; box-shadow: 0 -1px 6px rgba(0,0,0,0.06); }
.tab-btn { flex: 1; background: none; border: none; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 2px; border-radius: 10px; cursor: pointer; font-family: inherit; }
.tab-btn.active { color: #007AFF; }
[data-theme="dark"] .tab-btn.active { color: #6DB4FF; }
.tab-icon { font-size: 19px; line-height: 1; }
.tab-label { font-size: 10.5px; font-weight: 600; }

.tab-subheader { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.tab-subheader h2 { font-size: 19px; font-weight: 800; margin: 0; }
.back-btn { background: var(--pill-bg); border: none; color: var(--text); border-radius: 16px; padding: 6px 12px; font-size: 12.5px; font-weight: 600; cursor: pointer; font-family: inherit; }

.top-action { border-radius: 12px; padding: 11px 14px; font-size: 13.5px; font-weight: 700; letter-spacing: -0.005em; text-align: center; margin-bottom: 12px; }
.top-action.rojo { background: #FFE5E3; color: #D70015; }
.top-action.amarillo { background: #FFF3DE; color: #B25E00; }
[data-theme="dark"] .top-action.rojo { background: #3A1210; color: #FF6B60; }
[data-theme="dark"] .top-action.amarillo { background: #3A2A0A; color: #FFB84D; }
.app-header { margin-bottom: 16px; }
h1 { font-size: 25px; font-weight: 800; letter-spacing: -0.025em; margin: 2px 0 3px; }
.profile-line { color: var(--text-muted); font-size: 12.5px; margin: 0; font-weight: 600; letter-spacing: 0.01em; }

.options-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: flex-end; justify-content: center; z-index: 50; }
.options-sheet { background: var(--card-bg); width: 100%; max-width: 480px; border-radius: 18px 18px 0 0; padding: 14px 16px calc(18px + env(safe-area-inset-bottom)); max-height: 88vh; overflow-y: auto; }
.options-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.options-head h2 { font-size: 17px; font-weight: 800; margin: 0; }
.options-close { background: var(--pill-bg); border: none; color: var(--text); width: 28px; height: 28px; border-radius: 50%; font-size: 15px; cursor: pointer; }
.opt-section { padding: 10px 0; border-bottom: 1px solid var(--border); }
.opt-section:last-child { border-bottom: none; }
.opt-section-title { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); margin: 0 0 6px; }
.opt-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.opt-row + .opt-row { margin-top: 8px; }
.opt-row-label { font-size: 13.5px; font-weight: 600; }
.opt-row-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
.seg { display: flex; background: var(--input-bg); border-radius: 9px; padding: 2px; gap: 2px; }
.seg button { border: none; background: transparent; color: var(--text-muted); font-size: 12px; font-weight: 600; padding: 6px 9px; border-radius: 7px; cursor: pointer; font-family: inherit; }
.seg button.active { background: #007AFF; color: #fff; }
select { background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 9px; color: var(--text); font-size: 13px; padding: 7px 9px; font-family: inherit; }
.pay-config { margin-top: 8px; }
.pay-config label { font-size: 11px; color: var(--text-muted); font-weight: 600; display: block; margin-bottom: 4px; }
.pay-config input { width: 100%; }
.opt-slider-row { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
.opt-slider-row input[type=range] { flex: 1; accent-color: #007AFF; }
.opt-slider-val { font-size: 15px; font-weight: 800; color: #007AFF; width: 42px; text-align: right; }
.opt-btn-stack button { margin-bottom: 7px; }
.opt-btn-stack button:last-child { margin-bottom: 0; }

.pill-btn { background: var(--pill-bg); color: var(--text); border: none; border-radius: 18px; padding: 8px 14px; font-size: 12.5px; font-weight: 600; cursor: pointer; font-family: inherit; }
.pill-btn:disabled { opacity: 0.4; cursor: default; }
.pill-btn.danger { color: #FF3B30; }
.pill-btn.confirm { background: #FF3B30; color: #fff; }
.pill-btn.update { background: #EAF3FF; color: #007AFF; position: relative; }
[data-theme="dark"] .pill-btn.update { background: #0A2A4A; }
.pill-btn.update .dot { position: absolute; top: -3px; right: -3px; width: 9px; height: 9px; border-radius: 50%; background: #FF3B30; border: 2px solid var(--card-bg); }
.pill-btn.wide { width: 100%; justify-content: center; display: flex; }

.summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(148px, 1fr)); gap: 10px; margin-bottom: 14px; }
.sum-card { background: var(--card-bg); border-radius: 16px; padding: 14px 14px 12px; box-shadow: var(--shadow); }
.sum-label { font-size: 11.5px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.02em; margin-bottom: 4px; }
.sum-val { font-size: 21px; font-weight: 800; letter-spacing: -0.01em; }
.sum-val.red { color: #FF3B30; } .sum-val.green { color: #34C759; } .sum-val.blue { color: #007AFF; }
.status-pill { display: inline-block; margin-top: 6px; font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 10px; }
.status-pill.verde { background: #E3F8E9; color: #248A3D; }
.status-pill.amarillo { background: #FFF3DE; color: #B25E00; }
.status-pill.rojo { background: #FFE5E3; color: #D70015; }
[data-theme="dark"] .status-pill.verde { background: #123822; color: #4ADE80; }
[data-theme="dark"] .status-pill.amarillo { background: #3A2A0A; color: #FFB84D; }
[data-theme="dark"] .status-pill.rojo { background: #3A1210; color: #FF6B60; }

.panel { background: var(--card-bg); border-radius: 16px; padding: 16px 16px 14px; margin-bottom: 12px; box-shadow: var(--shadow); }
.panel h2 { font-size: 16.5px; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 2px; }
.panel .hint { color: var(--text-muted); font-size: 12.5px; line-height: 1.45; margin: 0 0 12px; }
.panel-head-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 4px; }
.panel-head-row h2 { margin-bottom: 2px; }
.panel-head-row .icon-pencil { flex-shrink: 0; margin-top: 2px; }
.sub-row-locked { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
.sub-row-locked:last-of-type { border-bottom: none; }
.locked-name { color: var(--text); }
.locked-amount { color: var(--text-muted); font-weight: 600; }

.sub-row { display: grid; grid-template-columns: 1fr 84px 30px; gap: 8px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
.sub-row-cat { display: grid; grid-template-columns: 1fr 84px 30px; gap: 8px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
.sub-row-cat select { background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 10px; color: var(--text); font-size: 13px; padding: 8px 9px; font-family: inherit; margin-top: 2px; }
.preset-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.preset-chip { background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text); border-radius: 16px; padding: 6px 11px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
.preset-chip:hover { border-color: #007AFF; color: #007AFF; }
.sub-row:last-of-type { border-bottom: none; }
.sub-row input { min-width: 0; width: 100%; }

input[type=text] { background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 10px; color: var(--text); font-size: 14px; padding: 9px 10px; font-family: inherit; }
input[type=date] { background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 10px; color: var(--text); font-size: 13.5px; padding: 8px 9px; font-family: inherit; }
input[type=text]:focus, input[type=date]:focus { outline: none; border-color: #007AFF; }
input::placeholder { color: var(--text-muted); opacity: 0.7; }

.icon-del { background: var(--input-bg); border: none; color: var(--text-muted); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 16px; line-height: 1; flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
.icon-del:hover { background: #FFE5E3; color: #FF3B30; }
.icon-pencil { background: var(--input-bg); border: none; color: var(--text-muted); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 14px; line-height: 1; flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
.icon-pencil:hover { background: #EAF3FF; color: #007AFF; }
.icon-pencil.done { background: #E3F8E9; color: #248A3D; font-size: 16px; font-weight: 800; }
.confirm-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 0; flex-wrap: wrap; }
.confirm-row span { font-size: 13px; color: var(--text-muted); flex: 1 1 140px; }
.confirm-row-btns { display: flex; gap: 8px; flex-shrink: 0; }
.card-collapsed-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
.card-collapsed-name { font-weight: 700; font-size: 14.5px; }
.card-collapsed-balance input { width: 100%; }
.delete-link { background: none; border: none; color: #FF3B30; font-size: 12.5px; font-weight: 600; cursor: pointer; padding: 10px 0 0; font-family: inherit; }
.pay-trigger { width: 100%; background: #34C759; color: #fff; border: none; border-radius: 10px; padding: 10px; font-weight: 700; font-size: 13.5px; cursor: pointer; margin-top: 10px; font-family: inherit; }
.pay-form { background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 12px; padding: 12px; margin-top: 10px; }

.add-btn { margin-top: 10px; width: 100%; background: #EAF3FF; color: #007AFF; border: none; border-radius: 10px; padding: 10px; font-size: 13.5px; font-weight: 600; cursor: pointer; font-family: inherit; }
[data-theme="dark"] .add-btn { background: #0A2A4A; }

.mini-total { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-muted); margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.mini-total b { color: var(--text); font-weight: 700; }

.card-entry { background: var(--card-bg-2); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 10px; }
.card-entry-top { display: grid; grid-template-columns: 1fr 30px; gap: 8px; align-items: center; margin-bottom: 8px; }
.card-entry-top input { min-width: 0; width: 100%; font-weight: 600; }
.card-fields { display: grid; grid-template-columns: repeat(auto-fit, minmax(78px, 1fr)); gap: 8px; }
.field-label { font-size: 10.5px; color: var(--text-muted); font-weight: 600; margin-bottom: 3px; display: block; }
.card-fields input { width: 100%; }

.util-bar-track { position: relative; height: 6px; background: var(--border); border-radius: 4px; margin-top: 10px; overflow: visible; }
.util-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
.util-bar-fill.verde { background: #34C759; } .util-bar-fill.amarillo { background: #FF9500; } .util-bar-fill.rojo { background: #FF3B30; }
.util-bar-fill.blink { animation: blinkBar 1s infinite; }
@keyframes blinkBar { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
.util-bar-marker { position: absolute; top: -3px; bottom: -3px; left: 30%; width: 2px; background: var(--text-muted); border-radius: 1px; }
.util-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

.goal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
@media (max-width: 460px) { .goal-grid { grid-template-columns: 1fr; } }
.goal-field label { font-size: 12px; color: var(--text-muted); font-weight: 600; display: block; margin-bottom: 4px; }
.goal-field input { width: 100%; }
.progress-track { height: 10px; background: var(--border); border-radius: 6px; overflow: hidden; margin-top: 4px; }
.progress-fill { height: 100%; background: linear-gradient(90deg,#5AC8FA,#007AFF); border-radius: 6px; transition: width 0.4s; }
.goal-caption { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-top: 6px; }

.calc-btn { width: 100%; background: #007AFF; color: #fff; border: none; border-radius: 12px; padding: 14px; font-weight: 700; font-size: 15px; cursor: pointer; margin: 4px 0 12px; font-family: inherit; }
.save-month-btn { width: 100%; background: var(--text); color: var(--bg); border: none; border-radius: 12px; padding: 12px; font-weight: 700; font-size: 14px; cursor: pointer; margin-bottom: 16px; font-family: inherit; }
.flash { text-align: center; color: #34C759; font-size: 13px; font-weight: 600; margin: -8px 0 14px; }

.sugerencias { background: #EAF3FF; border-radius: 14px; padding: 14px 16px; margin-bottom: 14px; }
[data-theme="dark"] .sugerencias { background: #0A2A4A; }
.sugerencias h2 { font-size: 14.5px; color: #007AFF; margin: 0 0 8px; }
[data-theme="dark"] .sugerencias h2 { color: #6DB4FF; }
.sugerencias ul { margin: 0; padding-left: 18px; }
.sugerencias li { font-size: 13.5px; line-height: 1.5; margin-bottom: 6px; }

.result-card { background: var(--card-bg); border-radius: 16px; padding: 4px 16px 12px; margin-bottom: 14px; box-shadow: var(--shadow); }
.result-line { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
.result-line:last-child { border-bottom: none; }
.result-line .name { font-weight: 600; }
.result-line .badge { font-size: 10px; background: #FFF3DE; color: #B25E00; padding: 1px 7px; border-radius: 8px; margin-left: 6px; font-weight: 700; }
.result-total { display: flex; justify-content: space-between; padding: 12px 0 4px; font-weight: 800; font-size: 15px; }

.warn-box { background: #FFE5E3; border-radius: 14px; padding: 16px; font-size: 14px; line-height: 1.55; color: #C4241A; margin-bottom: 14px; }
[data-theme="dark"] .warn-box { background: #3A1210; color: #FF9E96; }
.warn-box b { color: #D70015; }
[data-theme="dark"] .warn-box b { color: #FF6B60; }

.history-row { padding: 10px 0; border-bottom: 1px solid var(--border); }
.history-row:last-child { border-bottom: none; }
.history-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.history-month { font-weight: 700; font-size: 13.5px; text-transform: capitalize; }
.history-del { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; font-family: inherit; }
.history-del:hover { color: #FF3B30; }
.hbar-track { height: 10px; background: var(--border); border-radius: 6px; overflow: hidden; }
.hbar-fill { height: 100%; border-radius: 6px; }
.history-meta { display: flex; justify-content: space-between; font-size: 11.5px; color: var(--text-muted); margin-top: 4px; }

.empty-state { text-align: center; color: var(--text-muted); font-size: 12.5px; padding: 10px 0; }
.save-note { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 24px; }

.selector-wrap { max-width: 420px; margin: 0 auto; padding-top: 12vh; }
.selector-logo { width: 56px; height: 56px; border-radius: 16px; background: #007AFF; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 800; margin: 0 auto 14px; }
.selector-title { text-align: center; font-size: 22px; font-weight: 800; margin: 0 0 4px; }
.selector-hint { text-align: center; color: var(--text-muted); font-size: 13px; margin: 0 0 22px; }
.profile-row { display: flex; align-items: center; gap: 8px; background: var(--card-bg); border-radius: 14px; padding: 12px 14px; margin-bottom: 10px; box-shadow: var(--shadow); cursor: pointer; }
.profile-avatar { width: 36px; height: 36px; border-radius: 50%; background: #EAF3FF; color: #007AFF; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; flex-shrink: 0; }
[data-theme="dark"] .profile-avatar { background: #0A2A4A; }
.profile-name { flex: 1; font-weight: 600; font-size: 14.5px; }
.new-profile-row { display: flex; gap: 8px; margin-top: 12px; }
.new-profile-row input { flex: 1; }
.new-profile-row button { background: #007AFF; color: #fff; border: none; border-radius: 10px; padding: 0 16px; font-weight: 700; cursor: pointer; font-family: inherit; }
.lang-theme-row { display: flex; justify-content: center; gap: 8px; margin-top: 22px; }
</style>
</head>
<body>
<div id="root"></div>

<script>
"use strict";

/* ---------- traducciones ---------- */
const I18N = {

let LANG = "es";

/* ---------- utilidades ---------- */
const toNum = (v) => { const n = parseFloat(v); return isFinite(n) ? n : 0; };
const fmt0 = (n) => Math.round(isFinite(n) ? n : 0).toLocaleString(LANG === "es" ? "es-ES" : "en-US", { maximumFractionDigits: 0 });
const fmt10 = (n) => (Math.round((isFinite(n) ? n : 0) / 10) * 10).toLocaleString(LANG === "es" ? "es-ES" : "en-US", { maximumFractionDigits: 0 });

const uid = () => "id_" + Date.now() + "_" + (uidCounter++);

  { key: "renta", cat: "renta" }, { key: "wifi", cat: "wifi" }, { key: "telefono", cat: "telefono" }, { key: "seguro", cat: "seguro" },

function sym() { return CURRENCY[state.currency] || "$"; }

const ACTIVE_KEY = "cuentas-claras:perfil-activo";
const SETTINGS_KEY = "cuentas-claras:ajustes";
const dataKeyV3 = (id) => "cuentas-claras:datos-v3:" + id;
const dataKeyV2 = (id) => "cuentas-claras:datos-v2:" + id;

const MESES_ES = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
const MESES_EN = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const monthKey = (d) => { d = d || new Date(); return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0"); };
const monthLabel = (key) => { const p = key.split("-").map(Number); const arr = LANG === "es" ? MESES_ES : MESES_EN; return arr[p[1] - 1] + " " + p[0]; };

function statusFromRatio(ratio, insuficiente) {
  if (insuficiente || ratio > 0.9) return { key: "rojo", label: t("statusRojo") };
  if (ratio > 0.6) return { key: "amarillo", label: t("statusAmarillo") };
  return { key: "verde", label: t("statusVerde") };
}
function esc(v) { return String(v == null ? "" : v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

/* ---------- perfiles y ajustes ---------- */
function loadProfiles() { try { return JSON.parse(localStorage.getItem(PROFILES_KEY)) || []; } catch (e) { return []; } }
function saveProfiles(list) { try { localStorage.setItem(PROFILES_KEY, JSON.stringify(list)); } catch (e) {} }
function loadSettings() { try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; } catch (e) { return {}; } }
function saveSettings() { try { localStorage.setItem(SETTINGS_KEY, JSON.stringify({ theme: state.theme, lang: state.lang, currency: state.currency, objetivo: state.objetivo })); } catch (e) {} }

/* Carga con migración: intenta la llave actual (v3); si no hay nada, recupera datos guardados
   antes bajo la llave anterior (v2) para que una actualización de la app nunca borre lo ya puesto. */
function loadUserData(id) {
  try {
    let raw = localStorage.getItem(dataKeyV3(id));
    if (!raw) raw = localStorage.getItem(dataKeyV2(id));
    return raw ? JSON.parse(raw) : {};
  } catch (e) { return {}; }
}
function saveUserDataNow() {
  if (!state.activeProfileId) return;
  try {
    localStorage.setItem(dataKeyV3(state.activeProfileId), JSON.stringify({
      ingreso: state.ingreso, subs: state.subs, cards: state.cards,
      savingsRate: state.savingsRate, ahorroActual: state.ahorroActual, metaAhorro: state.metaAhorro, debito: state.debito, history: state.history,
      payFrequency: state.payFrequency, ultimoPago: state.ultimoPago, proximoPagoAjuste: state.proximoPagoAjuste,
      ingresosLog: state.ingresosLog, loans: state.loans,
    }));
    state.storageError = false;
  } catch (e) { state.storageError = true; }
}

const settingsInit = loadSettings();

const state = {
  screen: "selector",
  profiles: loadProfiles(),
  activeProfileId: null,
  confirmDeleteProfileId: null,
  theme: settingsInit.theme || "light",

  ingreso: "", subs: [], cards: [], savingsRate: 20, ahorroActual: "", metaAhorro: "", debito: "", history: [],

  resultado: null, confirmReset: false, savedFlash: false, storageError: false,
};
LANG = state.lang;
let UPDATE_AVAILABLE = false;

const undoStack = [];
let saveTimeout = null;
function scheduleSave() { if (saveTimeout) clearTimeout(saveTimeout); saveTimeout = setTimeout(saveUserDataNow, 300); }

function pushUndo() {
  undoStack.push(JSON.parse(JSON.stringify({
    subs: state.subs, cards: state.cards, ingreso: state.ingreso, savingsRate: state.savingsRate,
    ahorroActual: state.ahorroActual, metaAhorro: state.metaAhorro, debito: state.debito, history: state.history,
    payFrequency: state.payFrequency, ultimoPago: state.ultimoPago, proximoPagoAjuste: state.proximoPagoAjuste,
    ingresosLog: state.ingresosLog, loans: state.loans,
  })));
  if (undoStack.length > 15) undoStack.shift();
}
function undo() { const prev = undoStack.pop(); if (!prev) return; Object.assign(state, prev); scheduleSave(); rerenderPreservingFocus(); }

/* ---------- perfil ---------- */
function applyTheme() { document.documentElement.setAttribute("data-theme", state.theme); }

function enterProfile(id) {
  if (saveTimeout) { clearTimeout(saveTimeout); saveUserDataNow(); }
  state.activeProfileId = id;
  try { localStorage.setItem(ACTIVE_KEY, id); } catch (e) {}
  const d = loadUserData(id);
  state.ingreso = d.ingreso != null ? d.ingreso : "";
  state.subs = d.subs || [];
  state.cards = d.cards || [];
  state.savingsRate = d.savingsRate != null ? d.savingsRate : 20;
  state.ahorroActual = d.ahorroActual != null ? d.ahorroActual : "";
  state.debito = d.debito != null ? d.debito : "";
  state.metaAhorro = d.metaAhorro != null ? d.metaAhorro : "";
  state.history = d.history || [];
  state.payFrequency = d.payFrequency || "mensual";
  state.ultimoPago = d.ultimoPago || "";
  state.proximoPagoAjuste = d.proximoPagoAjuste || "";
  state.ingresosLog = d.ingresosLog || [];
  state.loans = d.loans || [];
  state.resultado = null; state.confirmReset = false; state.showOptions = false;
  state.expandedCardIds = {}; state.confirmDeleteSubId = null; state.confirmDeleteCardId = null; state.confirmDeleteHistoryKey = null; state.payingCardId = null; state.payFormMonto = ""; state.confirmDeleteLoanId = null;
  undoStack.length = 0;
  state.screen = "app";
  render();
  saveUserDataNow();
}
function createProfile() {
  const name = (state.newProfileName || "").trim();
  if (!name) return;
  const p = { id: uid(), nombre: name };
  state.profiles.push(p); saveProfiles(state.profiles); state.newProfileName = "";
  enterProfile(p.id);
}
function switchUser() {
  if (saveTimeout) { clearTimeout(saveTimeout); saveUserDataNow(); }
  state.activeProfileId = null;
  try { localStorage.removeItem(ACTIVE_KEY); } catch (e) {}
  state.screen = "selector"; state.showOptions = false;
  render();
}
function askDeleteProfile(id) { state.confirmDeleteProfileId = id; render(); }
function cancelDeleteProfile() { state.confirmDeleteProfileId = null; render(); }
function deleteProfile(id) {
  state.profiles = state.profiles.filter((p) => p.id !== id);
  saveProfiles(state.profiles);
  try { localStorage.removeItem(dataKeyV3(id)); localStorage.removeItem(dataKeyV2(id)); } catch (e) {}
  state.confirmDeleteProfileId = null;
  if (state.activeProfileId === id) { state.activeProfileId = null; state.screen = "selector"; }
  render();
}

function startPago(cardId) {
  const t2 = computeTotals();
  const resultado = t2.ingresoEfectivo > 0 ? computeResultado(t2) : null;
  let sugerido = "";
  if (resultado && !resultado.insuficiente) {
    const a = resultado.asignaciones.find((x) => x.id === cardId);
    if (a && a.pagoTotal > 0) sugerido = String(a.pagoTotal);
  }
  state.payingCardId = cardId;
  state.payFormSource = toNum(state.debito) >= toNum(state.ahorroActual) ? "debito" : "ahorro";
  state.payFormMonto = sugerido;
  render();
}

/* ---------- ingreso según frecuencia de pago ---------- */
function parseISODate(s) { if (!s) return null; const d = new Date(s + "T00:00:00"); return isNaN(d) ? null : d; }
function occurrenciasSemana(dia) {
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  let count = 0;
  for (let d = 1; d <= daysInMonth; d++) { if (new Date(year, month, d).getDay() === dia) count++; }
  return count;
}
function semanaOcurrenciasEsteMes() {
  const last = parseISODate(state.ultimoPago);
  if (!last) return 0;
  return occurrenciasSemana(last.getDay());
}
function ingresosEsteMes() {
  const mk = monthKey();
  return state.ingresosLog.filter((x) => x.month === mk);
}
function expectedPagosEsteMes() {
  if (state.payFrequency === "quincenal") return 2;
  if (state.payFrequency === "semanal") { const n = semanaOcurrenciasEsteMes(); return n > 0 ? n : 4; }
  return 1;
}
function ingresoActivo() {
  if (state.payFrequency === "mensual") return toNum(state.ingreso);
  return ingresosEsteMes().reduce((a, x) => a + toNum(x.monto), 0);
}
function nextGenericPayInfo(ultimoPagoStr, frecuencia) {
  const last = parseISODate(ultimoPagoStr);
  if (!last) return null;
  const now = new Date(); now.setHours(0, 0, 0, 0);
  let next = new Date(last);
  if (frecuencia === "mensual") {
    while (next < now) next.setMonth(next.getMonth() + 1);
  } else {
    const interval = frecuencia === "semanal" ? 7 : 15;
    while (next < now) next.setDate(next.getDate() + interval);
  }
  const diffDays = Math.round((next - now) / 86400000);
  return { date: next, diffDays };
}
function nextPayInfo() {
  const now = new Date(); now.setHours(0, 0, 0, 0);
  const ajuste = parseISODate(state.proximoPagoAjuste);
  if (ajuste && ajuste >= now) {
    return { date: ajuste, diffDays: Math.round((ajuste - now) / 86400000), ajustado: true };
  }
  return nextGenericPayInfo(state.ultimoPago, state.payFrequency);
}
function formatDate(d) { return d.toLocaleDateString(LANG === "es" ? "es-ES" : "en-US", { day: "numeric", month: "short" }); }
function diasLabel(n) { if (n === 0) return t("hoy"); if (n === 1) return t("manana"); return t("enDias")(n); }

function computeTotals() {
  const ingresoEfectivo = ingresoActivo();
  const totalSubs = state.subs.reduce((a, s) => a + toNum(s.monto), 0);
  const totalMinimos = state.cards.reduce((a, c) => a + toNum(c.minimo), 0);
  const totalPrestamos = state.loans.reduce((a, l) => a + (toNum(l.saldoTotal) > 0 ? toNum(l.montoPago) : 0), 0);
  const deudaPrestamos = state.loans.reduce((a, l) => a + Math.max(toNum(l.saldoTotal), 0), 0);
  const totalDeuda = state.cards.reduce((a, c) => a + toNum(c.saldo), 0) + deudaPrestamos;
  const cardsConLimite = state.cards.filter((c) => toNum(c.limite) > 0);
  const creditoDisponible = cardsConLimite.reduce((a, c) => a + Math.max(toNum(c.limite) - toNum(c.saldo), 0), 0);
  const disponibleBruto = ingresoEfectivo - totalSubs - totalPrestamos;
  const ratioComprometido = ingresoEfectivo > 0 ? (totalSubs + totalPrestamos + totalMinimos) / ingresoEfectivo : (totalSubs + totalPrestamos + totalMinimos > 0 ? 1.5 : 0);
  const insuficienteLive = disponibleBruto - totalMinimos < 0;
  const liveStatus = statusFromRatio(ratioComprometido, insuficienteLive);
  return { ingresoEfectivo, totalSubs, totalMinimos, totalPrestamos, totalDeuda, cardsConLimite, creditoDisponible, disponibleBruto, ratioComprometido, liveStatus };
}

function computeResultado(t2) {
  const restoTrasMinimos = t2.disponibleBruto - t2.totalMinimos;
  if (restoTrasMinimos < 0) return { insuficiente: true, faltante: Math.abs(restoTrasMinimos) };

  let effectiveRate = state.savingsRate;
  if (state.objetivo === "ahorro") effectiveRate = 100;
  else if (state.objetivo === "credito") effectiveRate = 0;

  const ahorroCrudo = restoTrasMinimos * (effectiveRate / 100);
  const ahorro = Math.round(ahorroCrudo / 10) * 10;
  let extraParaTarjetas = Math.round((restoTrasMinimos - ahorro) * 100) / 100;
  if (extraParaTarjetas < 0) extraParaTarjetas = 0;

  const ordenBase = state.cards
    .map((c) => ({ ...c, saldo: toNum(c.saldo), apr: toNum(c.apr), minimo: toNum(c.minimo), limite: toNum(c.limite) }))
    .filter((c) => c.saldo > 0 || c.minimo > 0 || c.nombre);
  const ordenAvalancha = state.objetivo === "credito"
    ? ordenBase.sort((a, b) => (b.limite > 0 ? b.saldo / b.limite : b.apr / 100) - (a.limite > 0 ? a.saldo / a.limite : a.apr / 100))
    : ordenBase.sort((a, b) => b.apr - a.apr);

  let restante = extraParaTarjetas;
  const asignaciones = ordenAvalancha.map((c) => {
    const espacio = Math.max(c.saldo - c.minimo, 0);
    const pagoExtra = Math.min(restante, espacio);
    restante = Math.round((restante - pagoExtra) * 100) / 100;
    return Object.assign({}, c, { pagoExtra, pagoTotal: Math.round((c.minimo + pagoExtra) * 100) / 100 });
  });
  const ahorroFinal = Math.round((ahorro + restante) / 10) * 10;
  return { insuficiente: false, ahorro: ahorroFinal, asignaciones };
}

function guardarMes() {
  const t2 = computeTotals();
  if (t2.ingresoEfectivo <= 0) return;
  const resultado = computeResultado(t2);
  pushUndo();
  const key = monthKey();
  const entry = {
    month: key, ingreso: t2.ingresoEfectivo, comprometido: t2.totalSubs + t2.totalMinimos, ratio: t2.ratioComprometido,
    ahorro: resultado.insuficiente ? 0 : resultado.ahorro, insuficiente: !!resultado.insuficiente, status: t2.liveStatus.key,
  };
  state.history = state.history.filter((x) => x.month !== key);
  state.history.push(entry);
  state.history.sort((a, b) => (a.month < b.month ? 1 : -1));
  state.savedFlash = true;
  scheduleSave();
  rerenderPreservingFocus();
  setTimeout(() => { state.savedFlash = false; rerenderPreservingFocus(); }, 1800);
}

async function actualizarApp() {
  try {
    if ("serviceWorker" in navigator) {
      const reg = await navigator.serviceWorker.getRegistration();
      if (reg && reg.waiting) {
        reg.waiting.postMessage("SKIP_WAITING");
        navigator.serviceWorker.addEventListener("controllerchange", () => location.reload());
        return;
      }
      if (reg) { try { await reg.update(); } catch (e) {} }
    }
    if ("caches" in window) { const keys = await caches.keys(); await Promise.all(keys.map((k) => caches.delete(k))); }
  } catch (e) {}
  location.reload();
}

/* ---------- sugerencias ---------- */
function buildSugerencias(t2, resultado) {
  const s = [];
  const r = resultado;
  if (!r) return s;
  if (state.payFrequency !== "mensual") {
    const logged = ingresosEsteMes().length;
    const esperados = expectedPagosEsteMes();
    if (logged < esperados) s.push(t("pagosIncompletos"));
  }
  if (r.insuficiente) {
    s.push(t("faltan") + " " + sym() + fmt0(r.faltante) + ".");
    const debito = toNum(state.debito);
    const ahorro = toNum(state.ahorroActual);
    const completos = pagosCompletosEsteMes();
    if (!completos) s.push(t("esperaAntesDeUsar"));
    else if (debito >= r.faltante) s.push(t("usaDebito")(fmt0(r.faltante)));
    else if (debito > 0 && debito + ahorro >= r.faltante) s.push(t("usaDebitoYAhorro")(fmt0(debito), fmt0(r.faltante - debito)));
    else if (ahorro > 0) s.push(t("usaAhorro")(fmt0(ahorro)));
    else s.push(t("sinAhorroRecorta"));
  } else {
    const conExtra = r.asignaciones.filter((c) => c.pagoExtra > 0);
    const prioridad = conExtra[0] || r.asignaciones[0];
    if (prioridad) {
      if (prioridad.pagoExtra > 0) {
        const fuente = toNum(state.debito) >= prioridad.pagoTotal ? t("fuenteDebito") : t("fuenteIngreso");
        s.push(t("pagaPrimeroExtra")(prioridad.nombre || t("tarjetaFallback"), fmt0(prioridad.apr), fmt0(prioridad.pagoTotal)) + " " + fuente);
      } else s.push(t("pagaPrimeroSinExtra")(prioridad.nombre || t("tarjetaFallback"), fmt0(prioridad.apr)));
    }
    if (t2.liveStatus.key === "verde") s.push(t("vaBien"));
    else if (t2.liveStatus.key === "amarillo") s.push(t("vasAjustado"));
    else s.push(t("mesApretado"));
    if (toNum(state.metaAhorro) > 0) {
      const falta = toNum(state.metaAhorro) - toNum(state.ahorroActual);
      if (falta <= 0) s.push(t("metaCumplida")(fmt0(toNum(state.metaAhorro))));
      else if (r.ahorro > 0) s.push(t("ritmoMeta")(fmt0(r.ahorro), fmt0(toNum(state.metaAhorro)), Math.ceil(falta / r.ahorro)));
      else s.push(t("sinAhorroMeta"));
    }
  }
  const np = nextPayInfo();
  if (np && np.diffDays > 0 && np.diffDays <= 14) s.push(t("proximoPagoSug")(np.diffDays));
  return s;
}

function pagosCompletosEsteMes() {
  if (state.payFrequency === "mensual") return true;
  return ingresosEsteMes().length >= expectedPagosEsteMes();
}

function computeTopAction(t2, resultado) {
  if (t2.ingresoEfectivo <= 0) return null;
  const faltante = t2.totalMinimos - t2.disponibleBruto;
  if (faltante > 0) {
    const debito = toNum(state.debito);
    if (debito >= faltante) {
      if (!pagosCompletosEsteMes()) return { level: "amarillo", text: t("topEsperaPago") };
      return { level: "amarillo", text: t("topUsaDebito")(fmt0(faltante)) };
    }
    return { level: "rojo", text: t("topFaltante")(fmt0(faltante)) };
  }
  const sobreLimite = t2.cardsConLimite
    .map((c) => ({ nombre: c.nombre, uso: (toNum(c.saldo) / toNum(c.limite)) * 100, monto: Math.max(toNum(c.saldo) - toNum(c.limite) * 0.3, 0) }))
    .filter((c) => c.monto > 0)
    .sort((a, b) => b.uso - a.uso);
  if (sobreLimite.length > 0 && (state.objetivo === "credito" || sobreLimite[0].uso >= 70)) {
    const top = sobreLimite[0];
    return { level: top.uso >= 70 ? "rojo" : "amarillo", text: t("topCuidarCredito")(top.nombre || t("tarjetaFallback"), fmt0(top.monto)) };
  }
  if (t2.liveStatus.key !== "verde" && resultado && !resultado.insuficiente) {
    const conExtra = resultado.asignaciones.filter((c) => c.pagoExtra > 0);
    const top = conExtra[0] || resultado.asignaciones[0];
    if (top && top.pagoTotal > 0) return { level: t2.liveStatus.key, text: t("topPrioriza")(top.nombre || t("tarjetaFallback"), fmt0(top.pagoTotal)) };
  }
  return null;
}

  }

  if (tab === "tarjetas") {
    if (state.payFlash) html += '<div class="flash">' + t("pagoRegistrado") + '</div>';
    html += '<div class="panel"><div class="panel-head-row"><p class="hint" style="margin-bottom:0;">' + t("cardsHint") + '</p><button class="icon-pencil' + (state.editingCards ? " done" : "") + '" data-action="toggleEditCards">' + (state.editingCards ? "\u2713" : "\u270e") + '</button></div>';
    if (!state.editingCards) {
      state.cards.forEach((c) => {
        html += '<div class="sub-row-locked"><span class="locked-name">' + esc(c.nombre || t("cardNombrePh")) + '</span><span class="locked-amount">' + sym() + fmt0(toNum(c.saldo)) + '</span></div>';
      });
      if (state.cards.length === 0) html += '<div class="empty-state">' + t("cardsEmpty") + '</div>';
      html += '<div class="mini-total"><span>' + t("totalMinimos") + '</span><b>' + sym() + fmt0(t2.totalMinimos) + '</b></div></div>';
    } else {
    state.cards.forEach((c) => {
      const lim = toNum(c.limite);
      const saldo = toNum(c.saldo);
      const uso = lim > 0 ? Math.min((saldo / lim) * 100, 100) : null;
      const usoNivel = uso === null ? "" : uso < 30 ? "verde" : uso < 70 ? "amarillo" : "rojo";

      if (state.confirmDeleteCardId === c.id) {
        html += '<div class="card-entry"><div class="confirm-row"><span>' + esc(t("confirmDeleteCardMsg")(c.nombre || t("cardNombrePh"))) + '</span><div class="confirm-row-btns"><button class="pill-btn confirm" data-action="removeCard" data-id="' + c.id + '">' + t("yesDelete") + '</button><button class="pill-btn" data-action="cancelDeleteCard">' + t("cancel") + '</button></div></div></div>';
        return;
      }

      if (state.expandedCardIds[c.id]) {
        html += '<div class="card-entry">';
        html += '<div class="card-entry-top"><input type="text" placeholder="' + t("cardNombrePh") + '" id="card-nombre-' + c.id + '" data-scope="card" data-id="' + c.id + '" data-field="nombre" value="' + esc(c.nombre) + '">';
        html += '<button class="icon-pencil done" data-action="toggleCardExpand" data-id="' + c.id + '">\u2713</button></div>';
        html += '<div class="card-fields">';
        html += '<div><span class="field-label">' + t("saldoLbl") + ' ' + sym() + '</span><input type="text" inputmode="decimal" placeholder="0" id="card-saldo-' + c.id + '" data-scope="card" data-id="' + c.id + '" data-field="saldo" value="' + esc(c.saldo) + '"></div>';
        html += '<div><span class="field-label">' + t("limiteLbl") + ' ' + sym() + '</span><input type="text" inputmode="decimal" placeholder="' + t("limiteOpcionalPh") + '" id="card-limite-' + c.id + '" data-scope="card" data-id="' + c.id + '" data-field="limite" value="' + esc(c.limite) + '"></div>';
        html += '<div><span class="field-label">' + t("taeLbl") + '</span><input type="text" inputmode="decimal" placeholder="0" id="card-apr-' + c.id + '" data-scope="card" data-id="' + c.id + '" data-field="apr" value="' + esc(c.apr) + '"></div>';
        html += '<div><span class="field-label">' + t("minimoLbl") + ' ' + sym() + '</span><input type="text" inputmode="decimal" placeholder="0" id="card-minimo-' + c.id + '" data-scope="card" data-id="' + c.id + '" data-field="minimo" value="' + esc(c.minimo) + '"></div>';
        html += '</div>';
        if (uso !== null) {
          html += utilBarHtml(uso, usoNivel);
          html += '<div class="util-label">' + t("usoLimite") + Math.round(uso) + '%</div>';
        }
        html += renderPagoBlock(c);
        html += '<button class="delete-link" data-action="askDeleteCard" data-id="' + c.id + '">' + t("deleteCardLink") + '</button>';
        html += '</div>';
      } else {
        html += '<div class="card-entry">';
        html += '<div class="card-collapsed-top"><span class="card-collapsed-name">' + esc(c.nombre || t("cardNombrePh")) + '</span><button class="icon-pencil" data-action="toggleCardExpand" data-id="' + c.id + '">\u270e</button></div>';
        html += '<div class="card-collapsed-balance"><span class="field-label">' + t("debesAhoraLbl") + ' ' + sym() + '</span><input type="text" inputmode="decimal" placeholder="0" id="card-saldo-' + c.id + '" data-scope="card" data-id="' + c.id + '" data-field="saldo" value="' + esc(c.saldo) + '" style="font-size:19px;font-weight:800;"></div>';
        if (uso !== null) {
          html += utilBarHtml(uso, usoNivel);
          html += '<div class="util-label">' + t("usoLimite") + Math.round(uso) + '%</div>';
        }
        html += renderPagoBlock(c);
        html += '</div>';
      }
    });
    if (state.cards.length === 0) html += '<div class="empty-state">' + t("cardsEmpty") + '</div>';
    html += '<button class="add-btn" data-action="addCard">' + t("addCard") + '</button>';
    html += '<div class="mini-total"><span>' + t("totalMinimos") + '</span><b>' + sym() + fmt0(t2.totalMinimos) + '</b></div></div>';
    }
  }

  if (tab === "historial") {
    html += '<div class="panel"><p class="hint">' + t("historialHint") + '</p>';
    if (state.history.length === 0) html += '<div class="empty-state">' + t("historialEmpty") + '</div>';
    state.history.forEach((h) => {
      const label = h.status === "verde" ? t("statusVerde") : h.status === "amarillo" ? t("statusAmarillo") : t("statusRojo");
      const metaLine = t("comprometidoDe").split("{s}").join(sym()).split("{a}").join(fmt0(h.comprometido)).split("{b}").join(fmt0(h.ingreso)).split("{c}").join(fmt0(h.ahorro));
      html += '<div class="history-row"><div class="history-top"><span class="history-month">' + esc(monthLabel(h.month)) + '</span><span class="status-pill ' + h.status + '">' + label + '</span></div>';
      html += '<div class="hbar-track"><div class="hbar-fill util-bar-fill ' + h.status + '" style="width:' + Math.min(h.ratio * 100, 100) + '%"></div></div>';
      if (state.confirmDeleteHistoryKey === h.month) {
        html += '<div class="history-meta"><span>' + esc(t("confirmDeleteHistoryMsg")(monthLabel(h.month))) + '</span><div class="confirm-row-btns"><button class="pill-btn confirm" data-action="removeHistory" data-id="' + h.month + '">' + t("yesDelete") + '</button><button class="pill-btn" data-action="cancelDeleteHistory">' + t("cancel") + '</button></div></div></div>';
      } else {
        html += '<div class="history-meta"><span>' + esc(metaLine) + '</span><button class="history-del" data-action="askDeleteHistory" data-id="' + h.month + '">' + t("eliminar") + '</button></div></div>';
      }
    });
    html += '</div>';
  }

  html += '</div>';
  html += renderTabBar();
  if (state.showOptions) html += renderOptionsSheet();
  html += '</div>';

  root.innerHTML = html;
}

function render() {
  applyTheme();
  document.documentElement.lang = state.lang;
  if (state.screen === "selector") renderSelector(); else renderApp();
}

function rerenderPreservingFocus() {
  const active = document.activeElement;
  let info = null;
  if (active && active.id && root.contains(active)) info = { id: active.id, start: active.selectionStart, end: active.selectionEnd };
  render();
  if (info) {
    const el = document.getElementById(info.id);
    if (el) {
      el.focus();
      if (typeof info.start === "number" && el.setSelectionRange) { try { el.setSelectionRange(info.start, info.end); } catch (e) {} }
    }
  }
}

/* ---------- eventos ---------- */
function sanitizeNum(str) {
  str = String(str).replace(/[^0-9.]/g, "");
  const parts = str.split(".");
  if (parts.length > 2) str = parts[0] + "." + parts.slice(1).join("");
  return str;
}

root.addEventListener("input", (e) => {
  const el = e.target;
  if (el.id === "new-profile-input") { state.newProfileName = el.value; return; }
  const scope = el.dataset.scope;
  if (!scope) return;
  if (scope === "ingreso") { state.ingreso = sanitizeNum(el.value); scheduleSave(); rerenderPreservingFocus(); return; }
  if (scope === "ahorroActual") { state.ahorroActual = sanitizeNum(el.value); scheduleSave(); rerenderPreservingFocus(); return; }
  if (scope === "debito") { state.debito = sanitizeNum(el.value); scheduleSave(); rerenderPreservingFocus(); return; }
  if (scope === "payFormMonto") { state.payFormMonto = sanitizeNum(el.value); rerenderPreservingFocus(); return; }
  if (scope === "metaAhorro") { state.metaAhorro = sanitizeNum(el.value); scheduleSave(); rerenderPreservingFocus(); return; }
  if (scope === "savingsRate") { state.savingsRate = Number(el.value); scheduleSave(); rerenderPreservingFocus(); return; }
  if (scope === "ingresoLog") {
    const entry = state.ingresosLog.find((x) => x.id === el.dataset.id);
    if (!entry) return;
    entry.monto = sanitizeNum(el.value);
    scheduleSave(); rerenderPreservingFocus(); return;
  }
  if (scope === "ultimoPago") { state.ultimoPago = el.value; scheduleSave(); render(); return; }
  if (scope === "proximoPagoAjuste") { state.proximoPagoAjuste = el.value; scheduleSave(); render(); return; }
  if (scope === "sub") {
    const item = state.subs.find((x) => x.id === el.dataset.id);
    if (!item) return;
    item[el.dataset.field] = el.dataset.field === "monto" ? sanitizeNum(el.value) : el.value;
    scheduleSave(); rerenderPreservingFocus(); return;
  }
  if (scope === "card") {
    const item = state.cards.find((x) => x.id === el.dataset.id);
    if (!item) return;
    item[el.dataset.field] = el.dataset.field === "nombre" ? el.value : sanitizeNum(el.value);
    scheduleSave(); rerenderPreservingFocus(); return;
  }
  if (scope === "loan") {
    const item = state.loans.find((x) => x.id === el.dataset.id);
    if (!item) return;
    const f = el.dataset.field;
    item[f] = (f === "nombre" || f === "ultimoPago") ? el.value : sanitizeNum(el.value);
    scheduleSave(); rerenderPreservingFocus(); return;
  }
});

root.addEventListener("keydown", (e) => { if (e.key === "Enter" && e.target && e.target.id === "new-profile-input") createProfile(); });

root.addEventListener("click", (e) => {
  if (e.target.classList && e.target.classList.contains("options-overlay")) {
    state.showOptions = false; render(); return;
  }
  const btn = e.target.closest("[data-action]");
  if (!btn) return;
  const action = btn.dataset.action;
  const id = btn.dataset.id;
  const freq = btn.dataset.freq;
  const map = {
    actualizar: actualizarApp, undo: undo,
    confirmReset: () => { state.confirmReset = true; render(); },
    cancelReset: () => { state.confirmReset = false; render(); },
    resetAll: resetAll,
    addSub: addSub, removeSub: () => removeSub(id), askDeleteSub: () => askDeleteSub(id), cancelDeleteSub: cancelDeleteSub, toggleEditSubs: toggleEditSubs,
    addSubPreset: () => addSubPreset(id),
    toggleEditIngreso: toggleEditIngreso, toggleEditAhorro: toggleEditAhorro, toggleEditCards: toggleEditCards,
    addIngresoEntry: addIngresoEntry, removeIngresoEntry: () => removeIngresoEntry(id),
    addCard: addCard, removeCard: () => removeCard(id), askDeleteCard: () => askDeleteCard(id), cancelDeleteCard: cancelDeleteCard,
    toggleCardExpand: () => toggleCardExpand(id),
    addLoan: addLoan, removeLoan: () => removeLoan(id), askDeleteLoan: () => askDeleteLoan(id), cancelDeleteLoan: cancelDeleteLoan,
    toggleEditLoans: toggleEditLoans, setLoanFrec: () => setLoanFrec(id, freq),
    startPago: () => startPago(id), cancelPago: cancelPago, confirmPago: () => confirmPago(id),
    setPagoSourceAhorro: setPagoSourceAhorro, setPagoSourceDebito: setPagoSourceDebito,
    guardarMes: guardarMes, removeHistory: () => removeHistory(id), askDeleteHistory: () => askDeleteHistory(id), cancelDeleteHistory: cancelDeleteHistory,
    switchUser: switchUser,
    toggleTheme: toggleTheme, toggleLang: toggleLang, toggleCurrency: toggleCurrency,
    setObjEquilibrado: () => setObjetivo("equilibrado"), setObjCredito: () => setObjetivo("credito"), setObjAhorro: () => setObjetivo("ahorro"),
    setLangEs: () => { if (state.lang !== "es") toggleLang(); },
    setLangEn: () => { if (state.lang !== "en") toggleLang(); },
    setCurUsd: () => { if (state.currency !== "usd") toggleCurrency(); },
    setCurEur: () => { if (state.currency !== "eur") toggleCurrency(); },
    setThemeLight: () => { if (state.theme !== "light") toggleTheme(); },
    setThemeDark: () => { if (state.theme !== "dark") toggleTheme(); },
    setPayMensual: () => setPayFrequency("mensual"),
    setPayQuincenal: () => setPayFrequency("quincenal"),
    setPaySemanal: () => setPayFrequency("semanal"),
    setAhorroNormal: () => setSavingsRate(10),
    setAhorroMedio: () => setSavingsRate(20),
    setAhorroAgresivo: () => setSavingsRate(35),
    toggleOptions: toggleOptions,
    goTab: () => goTab(id), goInicio: goInicio,
    enterProfile: () => enterProfile(id),
    askDeleteProfile: () => askDeleteProfile(id),
    cancelDeleteProfile: cancelDeleteProfile,
    deleteProfile: () => deleteProfile(id),
    createProfile: createProfile,
  };
  if (map[action]) map[action]();
});

/* ---------- arranque ---------- */
(function boot() {
  applyTheme();
  const activeId = (function () { try { return localStorage.getItem(ACTIVE_KEY); } catch (e) { return null; } })();
  if (activeId && state.profiles.some((p) => p.id === activeId)) enterProfile(activeId);
  else render();
})();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").then((reg) => {
      if (reg.waiting) { UPDATE_AVAILABLE = true; render(); }
      reg.addEventListener("updatefound", () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener("statechange", () => {
          if (nw.state === "installed" && navigator.serviceWorker.controller) { UPDATE_AVAILABLE = true; render(); }
        });
      });
    }).catch(() => {});
  });
}
</script>
