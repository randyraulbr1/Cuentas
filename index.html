<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Cuentas Claras</title>
<meta name="description" content="Controla tu ingreso, pagos fijos, tarjetas y ahorro." />
<meta name="theme-color" content="#007AFF" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Cuentas Claras" />
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin:0; padding:0; }

:root {
  --bg: #F2F2F7; --card-bg: #FFFFFF; --card-bg-2: #FAFAFB; --text: #1C1C1E; --text-muted: #8E8E93;
  --border: #F0F0F2; --input-bg: #F7F7F9; --input-border: #E5E5EA; --shadow: 0 1px 3px rgba(0,0,0,0.06); --pill-bg: #E9E9EB;
}
[data-theme="dark"] {
  --bg: #000000; --card-bg: #1C1C1E; --card-bg-2: #232326; --text: #F2F2F7; --text-muted: #98989D;
  --border: #2C2C2E; --input-bg: #2C2C2E; --input-border: #3A3A3C; --shadow: 0 1px 3px rgba(0,0,0,0.5); --pill-bg: #2C2C2E;
}

body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; transition: background 0.2s, color 0.2s; }
.page { padding: 20px 14px 70px; padding-top: max(20px, env(safe-area-inset-top)); }
.wrap { max-width: 760px; margin: 0 auto; position: relative; }

h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; margin: 4px 0 2px; padding-right: 50px; }
.subtitle { color: var(--text-muted); font-size: 13.5px; margin: 0 0 4px; }
.profile-line { color: var(--text-muted); font-size: 12.5px; margin: 0 0 18px; font-weight: 600; }

/* --- boton flotante de opciones --- */
.options-fab { position: fixed; top: max(18px, env(safe-area-inset-top)); right: 16px; width: 42px; height: 42px; border-radius: 50%; background: var(--card-bg); box-shadow: var(--shadow); border: none; font-size: 19px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 40; }
.options-fab .dot { position: absolute; top: 4px; right: 4px; width: 10px; height: 10px; border-radius: 50%; background: #FF3B30; border: 2px solid var(--card-bg); }

.options-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: flex-end; justify-content: center; z-index: 50; }
.options-sheet { background: var(--card-bg); width: 100%; max-width: 480px; border-radius: 20px 20px 0 0; padding: 18px 18px calc(24px + env(safe-area-inset-bottom)); max-height: 88vh; overflow-y: auto; }
.options-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.options-head h2 { font-size: 19px; font-weight: 800; margin: 0; }
.options-close { background: var(--pill-bg); border: none; color: var(--text); width: 30px; height: 30px; border-radius: 50%; font-size: 16px; cursor: pointer; }
.opt-section { margin-bottom: 18px; }
.opt-section-title { font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); margin: 0 0 8px; }
.opt-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 10px; }
.opt-row:last-child { border-bottom: none; }
.opt-row-label { font-size: 14px; font-weight: 600; }
.opt-row-sub { font-size: 11.5px; color: var(--text-muted); margin-top: 2px; }
.seg { display: flex; background: var(--input-bg); border-radius: 10px; padding: 3px; gap: 3px; }
.seg button { border: none; background: transparent; color: var(--text-muted); font-size: 12.5px; font-weight: 600; padding: 7px 10px; border-radius: 8px; cursor: pointer; font-family: inherit; }
.seg button.active { background: #007AFF; color: #fff; }
select { background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 10px; color: var(--text); font-size: 13.5px; padding: 8px 10px; font-family: inherit; }
.pay-config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
.pay-config-grid label { font-size: 11.5px; color: var(--text-muted); font-weight: 600; display: block; margin-bottom: 4px; }
.pay-config-grid input, .pay-config-grid select { width: 100%; }

.top-actions { display: flex; gap: 8px; justify-content: flex-end; margin-bottom: 10px; flex-wrap: wrap; }
.pill-btn { background: var(--pill-bg); color: var(--text); border: none; border-radius: 20px; padding: 7px 14px; font-size: 12.5px; font-weight: 600; cursor: pointer; font-family: inherit; }
.pill-btn:disabled { opacity: 0.4; cursor: default; }
.pill-btn.danger { color: #FF3B30; }
.pill-btn.confirm { background: #FF3B30; color: #fff; }
.pill-btn.update { background: #EAF3FF; color: #007AFF; position: relative; }
[data-theme="dark"] .pill-btn.update { background: #0A2A4A; }
.pill-btn.update .dot { position: absolute; top: -3px; right: -3px; width: 9px; height: 9px; border-radius: 50%; background: #FF3B30; border: 2px solid var(--card-bg); }
.pill-btn.wide { width: 100%; justify-content: center; display: flex; }

.summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(148px, 1fr)); gap: 10px; margin-bottom: 14px; }
.sum-card { background: var(--card-bg); border-radius: 16px; padding: 14px 14px 12px; box-shadow: var(--shadow); }
.sum-label { font-size: 11.5px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.02em; margin-bottom: 4px; }
.sum-val { font-size: 21px; font-weight: 800; letter-spacing: -0.01em; }
.sum-val.red { color: #FF3B30; } .sum-val.green { color: #34C759; } .sum-val.blue { color: #007AFF; }
.status-pill { display: inline-block; margin-top: 6px; font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 10px; }
.status-pill.verde { background: #E3F8E9; color: #248A3D; }
.status-pill.amarillo { background: #FFF3DE; color: #B25E00; }
.status-pill.rojo { background: #FFE5E3; color: #D70015; }
[data-theme="dark"] .status-pill.verde { background: #123822; color: #4ADE80; }
[data-theme="dark"] .status-pill.amarillo { background: #3A2A0A; color: #FFB84D; }
[data-theme="dark"] .status-pill.rojo { background: #3A1210; color: #FF6B60; }

.panel { background: var(--card-bg); border-radius: 16px; padding: 16px 16px 14px; margin-bottom: 12px; box-shadow: var(--shadow); }
.panel h2 { font-size: 16.5px; font-weight: 700; margin: 0 0 2px; }
.panel .hint { color: var(--text-muted); font-size: 12.5px; margin: 0 0 12px; }

.sub-row { display: flex; gap: 8px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.sub-row:last-of-type { border-bottom: none; }
.sub-row input[type=text] { flex: 1 1 140px; min-width: 0; }
.sub-row input.money { width: 92px; }

input[type=text] { background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 10px; color: var(--text); font-size: 14px; padding: 9px 10px; font-family: inherit; }
input[type=text]:focus { outline: none; border-color: #007AFF; }
input::placeholder { color: var(--text-muted); opacity: 0.7; }

.icon-del { background: var(--input-bg); border: none; color: var(--text-muted); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 16px; line-height: 1; flex-shrink: 0; }
.icon-del:hover { background: #FFE5E3; color: #FF3B30; }

.add-btn { margin-top: 10px; width: 100%; background: #EAF3FF; color: #007AFF; border: none; border-radius: 10px; padding: 10px; font-size: 13.5px; font-weight: 600; cursor: pointer; font-family: inherit; }
[data-theme="dark"] .add-btn { background: #0A2A4A; }

.mini-total { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-muted); margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.mini-total b { color: var(--text); font-weight: 700; }

.card-entry { background: var(--card-bg-2); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 10px; }
.card-entry-top { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
.card-entry-top input[type=text] { flex: 1; font-weight: 600; }
.card-fields { display: grid; grid-template-columns: repeat(auto-fit, minmax(78px, 1fr)); gap: 8px; }
.field-label { font-size: 10.5px; color: var(--text-muted); font-weight: 600; margin-bottom: 3px; display: block; }
.card-fields input { width: 100%; }

.util-bar-track { height: 6px; background: var(--border); border-radius: 4px; margin-top: 10px; overflow: hidden; }
.util-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
.util-bar-fill.verde { background: #34C759; } .util-bar-fill.amarillo { background: #FF9500; } .util-bar-fill.rojo { background: #FF3B30; }
.util-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

.slider-row { display: flex; align-items: center; gap: 12px; }
.slider-row input[type=range] { flex: 1; accent-color: #007AFF; }
.slider-val { font-size: 17px; font-weight: 800; color: #007AFF; width: 46px; text-align: right; }

.goal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
@media (max-width: 500px) { .goal-grid { grid-template-columns: 1fr; } }
.goal-field label { font-size: 12px; color: var(--text-muted); font-weight: 600; display: block; margin-bottom: 4px; }
.goal-field input { width: 100%; }
.progress-track { height: 10px; background: var(--border); border-radius: 6px; overflow: hidden; margin-top: 4px; }
.progress-fill { height: 100%; background: linear-gradient(90deg,#5AC8FA,#007AFF); border-radius: 6px; transition: width 0.4s; }
.goal-caption { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-top: 6px; }

.calc-btn { width: 100%; background: #007AFF; color: #fff; border: none; border-radius: 12px; padding: 14px; font-weight: 700; font-size: 15px; cursor: pointer; margin: 4px 0 12px; font-family: inherit; }
.save-month-btn { width: 100%; background: var(--text); color: var(--bg); border: none; border-radius: 12px; padding: 12px; font-weight: 700; font-size: 14px; cursor: pointer; margin-bottom: 16px; font-family: inherit; }
.flash { text-align: center; color: #34C759; font-size: 13px; font-weight: 600; margin: -8px 0 14px; }

.sugerencias { background: #EAF3FF; border-radius: 14px; padding: 14px 16px; margin-bottom: 14px; }
[data-theme="dark"] .sugerencias { background: #0A2A4A; }
.sugerencias h2 { font-size: 14.5px; color: #007AFF; margin: 0 0 8px; }
[data-theme="dark"] .sugerencias h2 { color: #6DB4FF; }
.sugerencias ul { margin: 0; padding-left: 18px; }
.sugerencias li { font-size: 13.5px; line-height: 1.5; margin-bottom: 6px; }

.result-card { background: var(--card-bg); border-radius: 16px; padding: 4px 16px 12px; margin-bottom: 14px; box-shadow: var(--shadow); }
.result-line { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
.result-line:last-child { border-bottom: none; }
.result-line .name { font-weight: 600; }
.result-line .badge { font-size: 10px; background: #FFF3DE; color: #B25E00; padding: 1px 7px; border-radius: 8px; margin-left: 6px; font-weight: 700; }
.result-total { display: flex; justify-content: space-between; padding: 12px 0 4px; font-weight: 800; font-size: 15px; }

.warn-box { background: #FFE5E3; border-radius: 14px; padding: 16px; font-size: 14px; line-height: 1.55; color: #C4241A; margin-bottom: 14px; }
[data-theme="dark"] .warn-box { background: #3A1210; color: #FF9E96; }
.warn-box b { color: #D70015; }
[data-theme="dark"] .warn-box b { color: #FF6B60; }

.history-row { padding: 10px 0; border-bottom: 1px solid var(--border); }
.history-row:last-child { border-bottom: none; }
.history-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.history-month { font-weight: 700; font-size: 13.5px; text-transform: capitalize; }
.history-del { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; font-family: inherit; }
.history-del:hover { color: #FF3B30; }
.hbar-track { height: 10px; background: var(--border); border-radius: 6px; overflow: hidden; }
.hbar-fill { height: 100%; border-radius: 6px; }
.history-meta { display: flex; justify-content: space-between; font-size: 11.5px; color: var(--text-muted); margin-top: 4px; }

.empty-state { text-align: center; color: var(--text-muted); font-size: 12.5px; padding: 10px 0; }
.save-note { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 24px; }

.selector-wrap { max-width: 420px; margin: 0 auto; padding-top: 12vh; }
.selector-logo { width: 56px; height: 56px; border-radius: 16px; background: #007AFF; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 800; margin: 0 auto 14px; }
.selector-title { text-align: center; font-size: 22px; font-weight: 800; margin: 0 0 4px; }
.selector-hint { text-align: center; color: var(--text-muted); font-size: 13px; margin: 0 0 22px; }
.profile-row { display: flex; align-items: center; gap: 8px; background: var(--card-bg); border-radius: 14px; padding: 12px 14px; margin-bottom: 10px; box-shadow: var(--shadow); cursor: pointer; }
.profile-avatar { width: 36px; height: 36px; border-radius: 50%; background: #EAF3FF; color: #007AFF; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; flex-shrink: 0; }
[data-theme="dark"] .profile-avatar { background: #0A2A4A; }
.profile-name { flex: 1; font-weight: 600; font-size: 14.5px; }
.new-profile-row { display: flex; gap: 8px; margin-top: 12px; }
.new-profile-row input { flex: 1; }
.new-profile-row button { background: #007AFF; color: #fff; border: none; border-radius: 10px; padding: 0 16px; font-weight: 700; cursor: pointer; font-family: inherit; }
.lang-theme-row { display: flex; justify-content: center; gap: 8px; margin-top: 22px; }
</style>
</head>

const fmt0 = (n) => Math.round(isFinite(n) ? n : 0).toLocaleString(LANG === "es" ? "es-ES" : "en-US", { maximumFractionDigits: 0 });
const fmt10 = (n) => (Math.round((isFinite(n) ? n : 0) / 10) * 10).toLocaleString(LANG === "es" ? "es-ES" : "en-US", { maximumFractionDigits: 0 });

function statusFromRatio(ratio, insuficiente) {

function saveUserDataNow() {

const settingsInit = loadSettings();

const state = {
  screen: "selector",
  profiles: loadProfiles(),

  lang: settingsInit.lang || "es",

  newProfileName: "",
  showOptions: false,

  ingreso: "", subs: [], cards: [], savingsRate: 20, ahorroActual: "", metaAhorro: "", history: [],
  payFrequency: "mensual", payDayMonthly: "", quincena1Dia: "1", quincena1Monto: "", quincena2Dia: "16", quincena2Monto: "",
  semanaDia: "5", semanaMonto: "",
  resultado: null, confirmReset: false, savedFlash: false, storageError: false,
};
LANG = state.lang;
let UPDATE_AVAILABLE = false;

const undoStack = [];
let saveTimeout = null;
function scheduleSave() { if (saveTimeout) clearTimeout(saveTimeout); saveTimeout = setTimeout(saveUserDataNow, 300); }

function pushUndo() {
  undoStack.push(JSON.parse(JSON.stringify({
    subs: state.subs, cards: state.cards, ingreso: state.ingreso, savingsRate: state.savingsRate,
    ahorroActual: state.ahorroActual, metaAhorro: state.metaAhorro, history: state.history,
    payFrequency: state.payFrequency, payDayMonthly: state.payDayMonthly,
    quincena1Dia: state.quincena1Dia, quincena1Monto: state.quincena1Monto,
    quincena2Dia: state.quincena2Dia, quincena2Monto: state.quincena2Monto,
    semanaDia: state.semanaDia, semanaMonto: state.semanaMonto,
  })));
  if (undoStack.length > 15) undoStack.shift();
}
function undo() { const prev = undoStack.pop(); if (!prev) return; Object.assign(state, prev); scheduleSave(); rerenderPreservingFocus(); }

  state.quincena2Dia = d.quincena2Dia != null ? d.quincena2Dia : "16";

/* ---------- acciones de datos ---------- */
function addSub() { state.subs.push({ id: uid(), nombre: "", monto: "" }); scheduleSave(); rerenderPreservingFocus(); }
function removeSub(id) { pushUndo(); state.subs = state.subs.filter((x) => x.id !== id); scheduleSave(); rerenderPreservingFocus(); }

function resetAll() {

/* ---------- ingreso según frecuencia de pago ---------- */
function occurrenciasSemana(dia) {
  if (dia === "" || dia == null) return 0;
  dia = Number(dia);
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  let count = 0;
  for (let d = 1; d <= daysInMonth; d++) { if (new Date(year, month, d).getDay() === dia) count++; }
  return count;
}
function ingresoActivo() {
  if (state.payFrequency === "quincenal") return toNum(state.quincena1Monto) + toNum(state.quincena2Monto);
  if (state.payFrequency === "semanal") return toNum(state.semanaMonto) * occurrenciasSemana(state.semanaDia);
  return toNum(state.ingreso);
}
function nextPayInfo() {
  const now = new Date(); now.setHours(0, 0, 0, 0);
  let candidates = [];
  function addMonthlyDay(day) {
    if (!(day >= 1 && day <= 31)) return;
    candidates.push(new Date(now.getFullYear(), now.getMonth(), day));
    candidates.push(new Date(now.getFullYear(), now.getMonth() + 1, day));
  }
  if (state.payFrequency === "mensual") {
    addMonthlyDay(Number(state.payDayMonthly) || 0);
  } else if (state.payFrequency === "quincenal") {
    addMonthlyDay(Number(state.quincena1Dia) || 0);
    addMonthlyDay(Number(state.quincena2Dia) || 0);
  } else if (state.payFrequency === "semanal") {
    if (state.semanaDia !== "" && state.semanaDia != null) {
      const dia = Number(state.semanaDia);
      for (let i = 0; i < 14; i++) {
        const d = new Date(now); d.setDate(now.getDate() + i);
        if (d.getDay() === dia) { candidates.push(d); break; }
      }
    }
  }
  candidates = candidates.filter((d) => d instanceof Date && !isNaN(d) && d >= now);
  candidates.sort((a, b) => a - b);
  if (candidates.length === 0) return null;
  const next = candidates[0];
  const diffDays = Math.round((next - now) / 86400000);
  return { date: next, diffDays };
}
function formatDate(d) { return d.toLocaleDateString(LANG === "es" ? "es-ES" : "en-US", { day: "numeric", month: "short" }); }
function diasLabel(n) { if (n === 0) return t("hoy"); if (n === 1) return t("manana"); return t("enDias")(n); }

function computeTotals() {
  const ingresoEfectivo = ingresoActivo();
  const totalSubs = state.subs.reduce((a, s) => a + toNum(s.monto), 0);
  const totalMinimos = state.cards.reduce((a, c) => a + toNum(c.minimo), 0);
  const totalDeuda = state.cards.reduce((a, c) => a + toNum(c.saldo), 0);
  const disponibleBruto = ingresoEfectivo - totalSubs;
  const ratioComprometido = ingresoEfectivo > 0 ? (totalSubs + totalMinimos) / ingresoEfectivo : (totalSubs + totalMinimos > 0 ? 1.5 : 0);
  const insuficienteLive = disponibleBruto - totalMinimos < 0;
  const liveStatus = statusFromRatio(ratioComprometido, insuficienteLive);
  return { ingresoEfectivo, totalSubs, totalMinimos, totalDeuda, disponibleBruto, ratioComprometido, liveStatus };
}

function calcular() {
  const t2 = computeTotals();
  const restoTrasMinimos = t2.disponibleBruto - t2.totalMinimos;
  if (restoTrasMinimos < 0) { state.resultado = { insuficiente: true, faltante: Math.abs(restoTrasMinimos) }; rerenderPreservingFocus(); return; }
  const ahorroCrudo = restoTrasMinimos * (state.savingsRate / 100);
  const ahorro = Math.round(ahorroCrudo / 10) * 10;
  let extraParaTarjetas = Math.round((restoTrasMinimos - ahorro) * 100) / 100;
  if (extraParaTarjetas < 0) extraParaTarjetas = 0;

  const ordenAvalancha = state.cards
    .map((c) => ({ ...c, saldo: toNum(c.saldo), apr: toNum(c.apr), minimo: toNum(c.minimo) }))
    .filter((c) => c.saldo > 0 || c.minimo > 0 || c.nombre)
    .sort((a, b) => b.apr - a.apr);

  let restante = extraParaTarjetas;
  const asignaciones = ordenAvalancha.map((c) => {
    const espacio = Math.max(c.saldo - c.minimo, 0);
    const pagoExtra = Math.min(restante, espacio);
    restante = Math.round((restante - pagoExtra) * 100) / 100;
    return Object.assign({}, c, { pagoExtra, pagoTotal: Math.round((c.minimo + pagoExtra) * 100) / 100 });
  });
  const ahorroFinal = Math.round((ahorro + restante) / 10) * 10;
  state.resultado = { insuficiente: false, ahorro: ahorroFinal, asignaciones };
  rerenderPreservingFocus();
}

function guardarMes() {
  if (!state.resultado) return;
  pushUndo();
  const t2 = computeTotals();
  const key = monthKey();
  const entry = {
    month: key, ingreso: t2.ingresoEfectivo, comprometido: t2.totalSubs + t2.totalMinimos, ratio: t2.ratioComprometido,
    ahorro: state.resultado.insuficiente ? 0 : state.resultado.ahorro, insuficiente: !!state.resultado.insuficiente, status: t2.liveStatus.key,
  };
  state.history = state.history.filter((x) => x.month !== key);
  state.history.push(entry);
  state.history.sort((a, b) => (a.month < b.month ? 1 : -1));
  state.savedFlash = true;
  scheduleSave();
  rerenderPreservingFocus();
  setTimeout(() => { state.savedFlash = false; rerenderPreservingFocus(); }, 1800);
}

async function actualizarApp() {
  try {
    if ("serviceWorker" in navigator) {
      const reg = await navigator.serviceWorker.getRegistration();
      if (reg && reg.waiting) {
        reg.waiting.postMessage("SKIP_WAITING");
        navigator.serviceWorker.addEventListener("controllerchange", () => location.reload());
        return;
      }
      if (reg) { try { await reg.update(); } catch (e) {} }
    }
    if ("caches" in window) { const keys = await caches.keys(); await Promise.all(keys.map((k) => caches.delete(k))); }
  } catch (e) {}
  location.reload();
}

/* ---------- sugerencias ---------- */
function buildSugerencias(t2) {
  const s = [];
  const r = state.resultado;
  if (!r) return s;
  if (r.insuficiente) {
    s.push(t("faltan") + " " + sym() + fmt0(r.faltante) + ".");
    if (toNum(state.ahorroActual) > 0) s.push(t("usaAhorro")(fmt0(toNum(state.ahorroActual))));
    else s.push(t("sinAhorroRecorta"));
  } else {
    const conExtra = r.asignaciones.filter((c) => c.pagoExtra > 0);
    const prioridad = conExtra[0] || r.asignaciones[0];
    if (prioridad) {
      if (prioridad.pagoExtra > 0) s.push(t("pagaPrimeroExtra")(prioridad.nombre || t("tarjetaFallback"), fmt0(prioridad.apr), fmt0(prioridad.pagoTotal)));
      else s.push(t("pagaPrimeroSinExtra")(prioridad.nombre || t("tarjetaFallback"), fmt0(prioridad.apr)));
    }
    if (t2.liveStatus.key === "verde") s.push(t("vaBien"));
    else if (t2.liveStatus.key === "amarillo") s.push(t("vasAjustado"));
    else s.push(t("mesApretado"));
    if (toNum(state.metaAhorro) > 0) {
      const falta = toNum(state.metaAhorro) - toNum(state.ahorroActual);
      if (falta <= 0) s.push(t("metaCumplida")(fmt0(toNum(state.metaAhorro))));
      else if (r.ahorro > 0) s.push(t("ritmoMeta")(fmt0(r.ahorro), fmt0(toNum(state.metaAhorro)), Math.ceil(falta / r.ahorro)));
      else s.push(t("sinAhorroMeta"));
    }
  }
  const np = nextPayInfo();
  if (np && np.diffDays > 0 && np.diffDays <= 14) s.push(t("proximoPagoSug")(np.diffDays));
  return s;
}

  h += '<div class="opt-row"><span class="opt-row-label">' + t("secMoneda") + '</span><div class="seg"><button class="' + (state.currency === "usd" ? "active" : "") + '" data-action="setCurUsd">$ USD</button><button class="' + (state.currency === "eur" ? "active" : "") + '" data-action="setCurEur">€ EUR</button></div></div></div>';

  h += '<div class="opt-section"><p class="opt-section-title">' + t("secTema") + '</p>';
  h += '<div class="opt-row"><span class="opt-row-label">' + t("secTema") + '</span><div class="seg"><button class="' + (state.theme === "light" ? "active" : "") + '" data-action="setThemeLight">☀️</button><button class="' + (state.theme === "dark" ? "active" : "") + '" data-action="setThemeDark">🌙</button></div></div></div>';

  h += '<div class="opt-section"><p class="opt-section-title">' + t("secPago") + '</p>';
  h += '<div class="seg" style="width:100%;">';
  h += '<button style="flex:1;" class="' + (state.payFrequency === "mensual" ? "active" : "") + '" data-action="setPayMensual">' + t("payMensual") + '</button>';
  h += '<button style="flex:1;" class="' + (state.payFrequency === "quincenal" ? "active" : "") + '" data-action="setPayQuincenal">' + t("payQuincenal") + '</button>';
  h += '<button style="flex:1;" class="' + (state.payFrequency === "semanal" ? "active" : "") + '" data-action="setPaySemanal">' + t("paySemanal") + '</button>';
  h += '</div>';

  if (state.payFrequency === "mensual") {
    h += '<div class="pay-config-grid"><div><label>' + t("payDayMonthlyLbl") + '</label><input type="text" inputmode="numeric" id="pay-day-monthly" data-scope="payDayMonthly" value="' + esc(state.payDayMonthly) + '"></div></div>';
  } else if (state.payFrequency === "quincenal") {
    h += '<div class="pay-config-grid">';
    h += '<div><label>' + t("quincena1DiaLbl") + '</label><input type="text" inputmode="numeric" id="q1-dia" data-scope="quincena1Dia" value="' + esc(state.quincena1Dia) + '"></div>';
    h += '<div><label>' + t("quincena2DiaLbl") + '</label><input type="text" inputmode="numeric" id="q2-dia" data-scope="quincena2Dia" value="' + esc(state.quincena2Dia) + '"></div>';
    h += '</div>';
  } else if (state.payFrequency === "semanal") {
    h += '<div class="pay-config-grid"><div style="grid-column:1/-1;"><label>' + t("semanaDiaLbl") + '</label><select id="semana-dia" data-scope="semanaDia">';
    weekdays.forEach((w, i) => { h += '<option value="' + i + '"' + (Number(state.semanaDia) === i ? " selected" : "") + '>' + esc(w) + '</option>'; });
    h += '</select></div></div>';
  }
  h += '</div>';

  h += '<div class="opt-section"><p class="opt-section-title">' + t("secDatos") + '</p>';
  h += '<button class="pill-btn wide update" data-action="actualizar" style="margin-bottom:8px;">' + t("update") + (UPDATE_AVAILABLE ? '<span class="dot"></span>' : '') + '</button>';
  h += '<button class="pill-btn wide" data-action="undo"' + (undoStack.length === 0 ? " disabled" : "") + ' style="margin-bottom:8px;">' + t("undo") + '</button>';
  if (!state.confirmReset) {
    h += '<button class="pill-btn wide danger" data-action="confirmReset">' + t("resetAll") + '</button>';
  } else {
    h += '<p style="font-size:12.5px;color:var(--text-muted);text-align:center;margin:6px 0;">' + t("confirmResetMsg") + '</p>';
    h += '<div style="display:flex;gap:8px;"><button class="pill-btn confirm" style="flex:1;" data-action="resetAll">' + t("yesDelete") + '</button><button class="pill-btn" style="flex:1;" data-action="cancelReset">' + t("cancel") + '</button></div>';
  }
  h += '</div>';

  h += '</div></div>';
  return h;
}

function renderApp() {
  const t2 = computeTotals();
  const metaProgreso = toNum(state.metaAhorro) > 0 ? Math.min((toNum(state.ahorroActual) / toNum(state.metaAhorro)) * 100, 100) : 0;
  const sugerencias = buildSugerencias(t2);
  const activeProfile = state.profiles.find((p) => p.id === state.activeProfileId);
  const np = nextPayInfo();

  let html = '<div class="page"><div class="wrap">';
  html += '<button class="options-fab" data-action="toggleOptions">⚙️' + (UPDATE_AVAILABLE ? '<span class="dot"></span>' : '') + '</button>';
  html += '<h1>' + t("brand") + '</h1><p class="subtitle">' + t("subtitle") + '</p>';
  if (activeProfile) html += '<p class="profile-line">' + esc(t("helloProfile")(activeProfile.nombre)) + '</p>';

  html += '<div class="summary">';
  html += '<div class="sum-card"><div class="sum-label">' + t("debesTotal") + '</div><div class="sum-val red">' + sym() + fmt0(t2.totalDeuda) + '</div></div>';
  html += '<div class="sum-card"><div class="sum-label">' + t("disponibleMes") + '</div><div class="sum-val ' + (t2.disponibleBruto >= 0 ? "green" : "red") + '">' + (t2.disponibleBruto >= 0 ? "" : "-") + sym() + fmt0(Math.abs(t2.disponibleBruto)) + '</div><span class="status-pill ' + t2.liveStatus.key + '">' + t2.liveStatus.label + '</span></div>';
  html += '<div class="sum-card"><div class="sum-label">' + t("ahorradoActual") + '</div><div class="sum-val blue">' + sym() + fmt0(toNum(state.ahorroActual)) + '</div></div>';
  if (np) html += '<div class="sum-card"><div class="sum-label">' + t("proximoPago") + '</div><div class="sum-val blue" style="font-size:16px;">' + esc(diasLabel(np.diffDays)) + '</div><div class="opt-row-sub">' + esc(formatDate(np.date)) + '</div></div>';
  html += '</div>';

  html += '<div class="panel"><h2>' + t("ingresoTitle") + '</h2><p class="hint">' + (state.payFrequency === "mensual" ? t("ingresoMensualHint") : t("ingresoHint")) + '</p>';
  if (state.payFrequency === "mensual") {
    html += '<input type="text" inputmode="decimal" placeholder="0" id="ingreso-input" data-scope="ingreso" value="' + esc(state.ingreso) + '" style="width:100%;font-size:20px;font-weight:700;">';
  } else if (state.payFrequency === "quincenal") {
    html += '<div class="goal-grid">';
    html += '<div class="goal-field"><label>' + t("ingresoQuincena1Lbl") + (state.quincena1Dia ? " (" + esc(state.quincena1Dia) + ")" : "") + '</label><input type="text" inputmode="decimal" placeholder="0" id="q1-monto" data-scope="quincena1Monto" value="' + esc(state.quincena1Monto) + '"></div>';
    html += '<div class="goal-field"><label>' + t("ingresoQuincena2Lbl") + (state.quincena2Dia ? " (" + esc(state.quincena2Dia) + ")" : "") + '</label><input type="text" inputmode="decimal" placeholder="0" id="q2-monto" data-scope="quincena2Monto" value="' + esc(state.quincena2Monto) + '"></div>';
    html += '</div>';
    html += '<div class="mini-total"><span>' + t("totalCalculado") + '</span><b>' + sym() + fmt0(t2.ingresoEfectivo) + '</b></div>';
  } else if (state.payFrequency === "semanal") {
    html += '<input type="text" inputmode="decimal" placeholder="0" id="semana-monto" data-scope="semanaMonto" value="' + esc(state.semanaMonto) + '" style="width:100%;font-size:20px;font-weight:700;">';
    const veces = occurrenciasSemana(state.semanaDia);
    html += '<div class="mini-total"><span>' + t("vecesEsteMes")(veces) + '</span><b>' + sym() + fmt0(t2.ingresoEfectivo) + '</b></div>';
  }
  html += '</div>';

  html += '<div class="panel"><h2>' + t("subsTitle") + '</h2><p class="hint">' + t("subsHint") + '</p>';
  state.subs.forEach((s) => {
    html += '<div class="sub-row">';
    html += '<input type="text" placeholder="' + t("subNombrePh") + '" id="sub-nombre-' + s.id + '" data-scope="sub" data-id="' + s.id + '" data-field="nombre" value="' + esc(s.nombre) + '">';
    html += '<input class="money" type="text" inputmode="decimal" placeholder="' + sym() + '" id="sub-monto-' + s.id + '" data-scope="sub" data-id="' + s.id + '" data-field="monto" value="' + esc(s.monto) + '">';
    html += '<button class="icon-del" data-action="removeSub" data-id="' + s.id + '">×</button></div>';
  });
  if (state.subs.length === 0) html += '<div class="empty-state">' + t("subsEmpty") + '</div>';
  html += '<button class="add-btn" data-action="addSub">' + t("addSub") + '</button>';
  html += '<div class="mini-total"><span>' + t("totalPagosFijos") + '</span><b>' + sym() + fmt0(t2.totalSubs) + '</b></div></div>';

  html += '<div class="panel"><h2>' + t("cardsTitle") + '</h2><p class="hint">' + t("cardsHint") + '</p>';
  state.cards.forEach((c) => {
    const lim = toNum(c.limite);
    const saldo = toNum(c.saldo);
    const uso = lim > 0 ? Math.min((saldo / lim) * 100, 100) : null;
    const usoNivel = uso === null ? "" : uso < 30 ? "verde" : uso < 70 ? "amarillo" : "rojo";
    html += '<div class="card-entry">';
    html += '<div class="card-entry-top"><input type="text" placeholder="' + t("cardNombrePh") + '" id="card-nombre-' + c.id + '" data-scope="card" data-id="' + c.id + '" data-field="nombre" value="' + esc(c.nombre) + '">';
    html += '<button class="icon-del" data-action="removeCard" data-id="' + c.id + '">×</button></div>';
    html += '<div class="card-fields">';
    html += '<div><span class="field-label">' + t("saldoLbl") + ' ' + sym() + '</span><input type="text" inputmode="decimal" placeholder="0" id="card-saldo-' + c.id + '" data-scope="card" data-id="' + c.id + '" data-field="saldo" value="' + esc(c.saldo) + '"></div>';
    html += '<div><span class="field-label">' + t("limiteLbl") + ' ' + sym() + '</span><input type="text" inputmode="decimal" placeholder="' + t("limiteOpcionalPh") + '" id="card-limite-' + c.id + '" data-scope="card" data-id="' + c.id + '" data-field="limite" value="' + esc(c.limite) + '"></div>';
    html += '<div><span class="field-label">' + t("taeLbl") + '</span><input type="text" inputmode="decimal" placeholder="0" id="card-apr-' + c.id + '" data-scope="card" data-id="' + c.id + '" data-field="apr" value="' + esc(c.apr) + '"></div>';
    html += '<div><span class="field-label">' + t("minimoLbl") + ' ' + sym() + '</span><input type="text" inputmode="decimal" placeholder="0" id="card-minimo-' + c.id + '" data-scope="card" data-id="' + c.id + '" data-field="minimo" value="' + esc(c.minimo) + '"></div>';
    html += '</div>';
    if (uso !== null) {
      html += '<div class="util-bar-track"><div class="util-bar-fill ' + usoNivel + '" style="width:' + uso + '%"></div></div>';
      html += '<div class="util-label">' + t("usoLimite") + Math.round(uso) + '%</div>';
    }
    html += '</div>';
  });
  if (state.cards.length === 0) html += '<div class="empty-state">' + t("cardsEmpty") + '</div>';
  html += '<button class="add-btn" data-action="addCard">' + t("addCard") + '</button>';
  html += '<div class="mini-total"><span>' + t("totalMinimos") + '</span><b>' + sym() + fmt0(t2.totalMinimos) + '</b></div></div>';

  html += '<div class="panel"><h2>' + t("ahorroPctTitle") + '</h2><p class="hint">' + t("ahorroPctHint") + '</p>';
  html += '<div class="slider-row"><input type="range" min="0" max="100" id="savings-rate-input" data-scope="savingsRate" value="' + state.savingsRate + '"><div class="slider-val">' + state.savingsRate + '%</div></div></div>';

  html += '<div class="panel"><h2>' + t("tuAhorroTitle") + '</h2><p class="hint">' + t("tuAhorroHint") + '</p>';
  html += '<div class="goal-grid">';
  html += '<div class="goal-field"><label>' + t("ahorroActualLbl") + ' ' + sym() + '</label><input type="text" inputmode="decimal" placeholder="0" id="ahorro-actual-input" data-scope="ahorroActual" value="' + esc(state.ahorroActual) + '"></div>';
  html += '<div class="goal-field"><label>' + t("metaAhorroLbl") + ' ' + sym() + '</label><input type="text" inputmode="decimal" placeholder="0" id="meta-ahorro-input" data-scope="metaAhorro" value="' + esc(state.metaAhorro) + '"></div>';
  html += '</div>';
  if (toNum(state.metaAhorro) > 0) {
    html += '<div class="progress-track"><div class="progress-fill" style="width:' + metaProgreso + '%"></div></div>';
    html += '<div class="goal-caption"><span>' + sym() + fmt0(toNum(state.ahorroActual)) + ' / ' + sym() + fmt0(toNum(state.metaAhorro)) + '</span><span>' + Math.round(metaProgreso) + '%</span></div>';
  }
  html += '</div>';

  html += '<button class="calc-btn" data-action="calcular">' + t("calcBtn") + '</button>';

  if (state.resultado && state.resultado.insuficiente) {
    html += '<div class="warn-box"><b>' + t("noAlcanza") + '</b><br>' + t("faltan") + ' <b>' + sym() + fmt0(state.resultado.faltante) + '</b>.</div>';
  }
  if (state.resultado && !state.resultado.insuficiente) {
    html += '<div class="result-card">';
    html += '<div class="result-line"><span>' + t("ingresoLbl") + '</span><span>' + sym() + fmt0(t2.ingresoEfectivo) + '</span></div>';
    html += '<div class="result-line"><span>' + t("pagosFijosLbl") + '</span><span>−' + sym() + fmt0(t2.totalSubs) + '</span></div>';
    state.resultado.asignaciones.forEach((c) => {
      html += '<div class="result-line"><span class="name">' + esc(c.nombre || t("tarjetaFallback")) + (c.pagoExtra > 0 ? '<span class="badge">' + t("extraBadge") + '</span>' : '') + '</span><span>−' + sym() + fmt0(c.pagoTotal) + '</span></div>';
    });
    if (state.cards.length === 0) html += '<div class="result-line"><span>' + t("sinTarjetas") + '</span><span>—</span></div>';
    html += '<div class="result-line"><span>' + t("ahorroSugerido") + '</span><span>' + sym() + fmt10(state.resultado.ahorro) + '</span></div>';
    html += '<div class="result-total"><span>' + t("totalRepartido") + '</span><span>' + sym() + fmt0(t2.ingresoEfectivo) + '</span></div>';
    html += '</div>';
  }

  if (sugerencias.length > 0) {
    html += '<div class="sugerencias"><h2>' + t("sugerenciasTitle") + '</h2><ul>';
    sugerencias.forEach((s) => { html += '<li>' + esc(s) + '</li>'; });
    html += '</ul></div>';
  }

  if (state.resultado) html += '<button class="save-month-btn" data-action="guardarMes">' + t("guardarMes") + '</button>';
  if (state.savedFlash) html += '<div class="flash">' + t("mesGuardado") + '</div>';

  html += '<div class="panel"><h2>' + t("historialTitle") + '</h2><p class="hint">' + t("historialHint") + '</p>';
  if (state.history.length === 0) html += '<div class="empty-state">' + t("historialEmpty") + '</div>';
  state.history.forEach((h) => {
    const label = h.status === "verde" ? t("statusVerde") : h.status === "amarillo" ? t("statusAmarillo") : t("statusRojo");
    const metaLine = t("comprometidoDe").split("{s}").join(sym()).split("{a}").join(fmt0(h.comprometido)).split("{b}").join(fmt0(h.ingreso)).split("{c}").join(fmt0(h.ahorro));
    html += '<div class="history-row"><div class="history-top"><span class="history-month">' + esc(monthLabel(h.month)) + '</span><span class="status-pill ' + h.status + '">' + label + '</span></div>';
    html += '<div class="hbar-track"><div class="hbar-fill util-bar-fill ' + h.status + '" style="width:' + Math.min(h.ratio * 100, 100) + '%"></div></div>';
    html += '<div class="history-meta"><span>' + esc(metaLine) + '</span><button class="history-del" data-action="removeHistory" data-id="' + h.month + '">' + t("eliminar") + '</button></div></div>';
  });
  html += '</div>';

  html += '<p class="save-note">' + (state.storageError ? t("saveNoteErr") : t("saveNoteOk")) + '</p>';
  html += '</div>';
  if (state.showOptions) html += renderOptionsSheet();
  html += '</div>';

  root.innerHTML = html;
}

function render() {
  applyTheme();
  document.documentElement.lang = state.lang;
  if (state.screen === "selector") renderSelector(); else renderApp();
}

function rerenderPreservingFocus() {
  const active = document.activeElement;
  let info = null;
  if (active && active.id && root.contains(active)) info = { id: active.id, start: active.selectionStart, end: active.selectionEnd };
  render();
  if (info) {
    const el = document.getElementById(info.id);
    if (el) {
      el.focus();
      if (typeof info.start === "number" && el.setSelectionRange) { try { el.setSelectionRange(info.start, info.end); } catch (e) {} }
    }
  }
}

/* ---------- eventos ---------- */
function sanitizeNum(str) {
  str = String(str).replace(/[^0-9.]/g, "");
  const parts = str.split(".");
  if (parts.length > 2) str = parts[0] + "." + parts.slice(1).join("");
  return str;
}
function sanitizeInt(str) { return String(str).replace(/[^0-9]/g, "").slice(0, 2); }

root.addEventListener("input", (e) => {
  const el = e.target;
  if (el.id === "new-profile-input") { state.newProfileName = el.value; return; }
  const scope = el.dataset.scope;
  if (!scope) return;
  if (scope === "ingreso") { state.ingreso = sanitizeNum(el.value); scheduleSave(); rerenderPreservingFocus(); return; }
  if (scope === "ahorroActual") { state.ahorroActual = sanitizeNum(el.value); scheduleSave(); rerenderPreservingFocus(); return; }
  if (scope === "metaAhorro") { state.metaAhorro = sanitizeNum(el.value); scheduleSave(); rerenderPreservingFocus(); return; }
  if (scope === "savingsRate") { state.savingsRate = Number(el.value); scheduleSave(); rerenderPreservingFocus(); return; }
  if (scope === "quincena1Monto") { state.quincena1Monto = sanitizeNum(el.value); scheduleSave(); rerenderPreservingFocus(); return; }
  if (scope === "quincena2Monto") { state.quincena2Monto = sanitizeNum(el.value); scheduleSave(); rerenderPreservingFocus(); return; }
  if (scope === "semanaMonto") { state.semanaMonto = sanitizeNum(el.value); scheduleSave(); rerenderPreservingFocus(); return; }
  if (scope === "payDayMonthly") { state.payDayMonthly = sanitizeInt(el.value); scheduleSave(); rerenderPreservingFocus(); return; }
  if (scope === "quincena1Dia") { state.quincena1Dia = sanitizeInt(el.value); scheduleSave(); rerenderPreservingFocus(); return; }
  if (scope === "quincena2Dia") { state.quincena2Dia = sanitizeInt(el.value); scheduleSave(); rerenderPreservingFocus(); return; }
  if (scope === "semanaDia") { state.semanaDia = el.value; scheduleSave(); render(); return; }
  if (scope === "sub") {
    const item = state.subs.find((x) => x.id === el.dataset.id);
    if (!item) return;
    item[el.dataset.field] = el.dataset.field === "monto" ? sanitizeNum(el.value) : el.value;
    scheduleSave(); rerenderPreservingFocus(); return;
  }
  if (scope === "card") {
    const item = state.cards.find((x) => x.id === el.dataset.id);
    if (!item) return;
    item[el.dataset.field] = el.dataset.field === "nombre" ? el.value : sanitizeNum(el.value);
    scheduleSave(); rerenderPreservingFocus(); return;
  }
});

root.addEventListener("keydown", (e) => { if (e.key === "Enter" && e.target && e.target.id === "new-profile-input") createProfile(); });

root.addEventListener("click", (e) => {
  const btn = e.target.closest("[data-action]");
  if (!btn) return;
  const action = btn.dataset.action;
  const id = btn.dataset.id;
  const map = {
    actualizar: actualizarApp, undo: undo,
    confirmReset: () => { state.confirmReset = true; render(); },
    cancelReset: () => { state.confirmReset = false; render(); },
    resetAll: resetAll,
    addSub: addSub, removeSub: () => removeSub(id),
    addCard: addCard, removeCard: () => removeCard(id),
    calcular: calcular, guardarMes: guardarMes, removeHistory: () => removeHistory(id),
    switchUser: switchUser,
    toggleTheme: toggleTheme, toggleLang: toggleLang, toggleCurrency: toggleCurrency,
    setLangEs: () => { if (state.lang !== "es") toggleLang(); },
    setLangEn: () => { if (state.lang !== "en") toggleLang(); },
    setCurUsd: () => { if (state.currency !== "usd") toggleCurrency(); },
    setCurEur: () => { if (state.currency !== "eur") toggleCurrency(); },
    setThemeLight: () => { if (state.theme !== "light") toggleTheme(); },
    setThemeDark: () => { if (state.theme !== "dark") toggleTheme(); },
    setPayMensual: () => setPayFrequency("mensual"),
    setPayQuincenal: () => setPayFrequency("quincenal"),
    setPaySemanal: () => setPayFrequency("semanal"),
    toggleOptions: toggleOptions,
    closeOptionsBackdrop: () => { state.showOptions = false; render(); },
    enterProfile: () => enterProfile(id),
    askDeleteProfile: () => askDeleteProfile(id),
    cancelDeleteProfile: cancelDeleteProfile,
    deleteProfile: () => deleteProfile(id),
    createProfile: createProfile,
  };
  if (map[action]) map[action]();
});

/* ---------- arranque ---------- */
(function boot() {
  applyTheme();
  const activeId = (function () { try { return localStorage.getItem(ACTIVE_KEY); } catch (e) { return null; } })();
  if (activeId && state.profiles.some((p) => p.id === activeId)) enterProfile(activeId);
  else render();
})();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").then((reg) => {
      if (reg.waiting) { UPDATE_AVAILABLE = true; render(); }
      reg.addEventListener("updatefound", () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener("statechange", () => {
          if (nw.state === "installed" && navigator.serviceWorker.controller) { UPDATE_AVAILABLE = true; render(); }
        });
      });
    }).catch(() => {});
  });
}
</script>
