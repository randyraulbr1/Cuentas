services:
  - type: web
    name: cuentas-claras
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PLAID_ENV
        value: sandbox
      - key: PLAID_CLIENT_ID
        sync: false
      - key: PLAID_SECRET
        sync: false
      - key: TOKEN_ENCRYPTION_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cuentas-claras-db
          property: connectionString

databases:
  - name: cuentas-claras-db
    plan: free
